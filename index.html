<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <div class="container">
      <div id="wrapper" class="wrapper">
        <h1>This too shall pass</h1>
      </div>
      <div class="button__wrapper">
        <button
          type="button"
          onclick="
            document.getElementById('wrapper').style.backgroundColor = 'Blue'
          "
        >
          Blue
        </button>
        <button
          type="button"
          onclick="
            document.getElementById('wrapper').style.backgroundColor = 'Red'
          "
        >
          Red
        </button>
        <button
          type="button"
          onclick="
            document.getElementById('wrapper').style.backgroundColor = 'Green'
          "
        >
          Green
        </button>
        <button
          type="button"
          onclick="
            document.getElementById('wrapper').style.backgroundColor = 'White'
          "
        >
          White
        </button>
      </div>
    </div>
    <script src="./js/app.js"></script>
  </body>
</html>
